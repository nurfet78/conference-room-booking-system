spring:
  flyway:
    enabled: true
    clean-disabled: false

  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    org.nurfet.bookingsystem: debug
    org.hibernate.sql: debug
    org.flywaydb: debug
    org.testcontainers: warn