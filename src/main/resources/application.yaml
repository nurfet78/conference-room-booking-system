server:
  port: 8888
spring:
  application:
    name: BookingSystem
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_NAME}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  mvc:
    hiddenmethod:
      filter:
        enabled: true

logging:
  level:
    root: info